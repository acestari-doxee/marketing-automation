# Deal Engagement Extractor configuration

# HubSpot segment ID "Deal Created in 2026 – New Logo/Cross-Sell"
list_id: 17603

# HubSpot lead score property name.
# - "lead_score_contacts_total" is the overall contact score (default).
# - "lead_score_contacts_engagement" tracks only marketing engagement activity.
# - If Doxee uses a different custom score, change it here.
score_property: lead_score_contacts_total

# Minimum score required to include a contact.
# - null  -> include all contacts WITH a score (only unscored ones are excluded). Matches the template file.
# - 1     -> also exclude zeros
# - 10    -> only "High engagement" per the legend
score_threshold: null

# Output (.xlsx) and cache (.json) directories
output_dir: ./output
cache_dir: ./data/cache
